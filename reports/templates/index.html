<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Éco - Signalement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #28a745 !important; } /* Vert Éco */
    </style>
</head>
<body>

    <nav class="navbar navbar-dark shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🌿 Campus Éco-IA</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center text-success mb-4">Signaler un incident</h3>
                        
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Type de problème</label>
                                <select class="form-select">
                                    <option selected disabled>Choisir une catégorie...</option>
                                    <option value="eau">Fuite d'eau</option>
                                    <option value="elec">Éclairage inutile</option>
                                    <option value="dechet">Déchets / Propreté</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Localisation (Bâtiment/Salle)</label>
                                <input type="text" class="form-control" placeholder="Ex: Bâtiment A, Salle 12">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Description du problème</label>
                                <textarea class="form-control" rows="4" placeholder="Décrivez le problème précisément..."></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="button" class="btn btn-success btn-lg">Envoyer le signalement</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
