<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — Campus Éco-IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1b4332, #40916c);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 20px;
            padding: 40px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .auth-logo { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
        .btn-eco { background: #2d6a4f; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-eco:hover { background: #1b4332; color: white; }
        .form-control { border-radius: 10px; padding: 12px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #40916c; box-shadow: 0 0 0 0.2rem rgba(64,145,108,0.15); }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">🌱</div>
    <h4 class="fw-bold text-center mb-1" style="color: #1b4332;">Connexion</h4>
    <p class="text-muted text-center small mb-4">Campus Éco-IA</p>

    {% if form.errors %}
        <div class="alert alert-danger small">Identifiants incorrects. Réessayez.</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold small">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" placeholder="Votre nom d'utilisateur" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold small">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-eco">
            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
        </button>
    </form>

    <p class="text-center text-muted small mt-4">
        Pas encore de compte ?
        <a href="{% url 'register' %}" style="color: #2d6a4f; font-weight: 600;">S'inscrire</a>
    </p>
    <p class="text-center mt-2">
        <a href="/" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Retour à l'accueil</a>
    </p>
</div>
</body>
</html>
