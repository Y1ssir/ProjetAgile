{% extends "reports/base.html" %}

{% block title %}Signalement envoyé !{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card p-5">
            <div style="font-size: 4rem;">🌿</div>
            <h2 class="text-success fw-bold mt-3">Merci pour votre signalement !</h2>
            <p class="text-muted">Votre signalement a été enregistré avec succès.<br>
            Notre équipe va traiter votre demande.</p>
            <div class="d-flex gap-2 justify-content-center mt-4">
                <a href="{% url 'reports:report_list' %}" class="btn btn-eco px-4">
                    <i class="fas fa-list me-2"></i>Voir tous les signalements
                </a>
                <a href="{% url 'reports:report_create' %}" class="btn btn-outline-success px-4">
                    <i class="fas fa-plus me-2"></i>Nouveau signalement
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
