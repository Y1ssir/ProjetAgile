<h2>Détails du Signalement</h2>

<div style="border: 1px solid #ccc; padding: 15px; border-radius: 8px;">
    <h3>{{ report.title }}</h3>
    <p><strong>Catégorie :</strong> {{ report.category }}</p>
    <p><strong>Description :</strong> {{ report.description }}</p>
    
    {% if report.image %}
        <p><strong>Image :</strong><br>
        <img src="{{ report.image.url }}" alt="Signalement" style="max-width: 400px;"></p>
    {% endif %}

    <hr>
    <div style="background-color: #e8f4fd; padding: 10px; border-left: 5px solid #2196F3;">
        <h4>🤖 Conseil de l'IA (Eco-Assistant) :</h4>
        <p>{{ advice }}</p>
    </div>
</div>

<br>
<a href="{% url 'reports:report_list' %}">Retour à la liste</a> | 
<a href="{% url 'reports:report_create' %}">Nouveau signalement</a>
